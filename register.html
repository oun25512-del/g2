<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก — StudyDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-mesh"></div>

<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div>
        <div class="logo-text">StudyDesk</div>
        <div class="logo-sub">ระบบจัดการการเรียนของฉัน</div>
      </div>
    </div>

    <h1 class="auth-title">สร้างบัญชีใหม่ ✨</h1>
    <p class="auth-subtitle">เริ่มต้นจัดระเบียบการเรียนของคุณวันนี้เลย!</p>

    <!-- Progress Steps -->
    <div style="display:flex; gap:8px; margin-bottom:28px;" id="steps">
      <div class="step-dot active" data-step="1">1</div>
      <div style="flex:1; height:2px; background:var(--border); margin-top:11px; border-radius:2px;" id="progress-bar"></div>
      <div class="step-dot" data-step="2">2</div>
    </div>

    <!-- Step 1: Basic Info -->
    <div id="step1">
      <div class="form-group">
        <label class="form-label">👤 ชื่อ-นามสกุล</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🧑</span>
          <input id="regName" type="text" class="form-input"
                 placeholder="ชื่อของคุณ" autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📧 อีเมล (ใช้เข้าสู่ระบบ)</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input id="regEmail" type="email" class="form-input"
                 placeholder="your@email.com" autocomplete="email">
        </div>
        <div id="emailStatus" style="font-size:12px;margin-top:6px;"></div>
      </div>

      <div class="form-group">
        <label class="form-label">🔑 Gmail (สำหรับแจ้งเตือน/Google)</label>
        <div class="input-icon-wrap">
          <span class="input-icon">📬</span>
          <input id="regGmail" type="email" class="form-input"
                 placeholder="your@gmail.com" autocomplete="email">
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:5px;">
          💡 ไม่บังคับ — ใช้สำหรับรับการแจ้งเตือนผ่าน Gmail
        </div>
      </div>

      <button class="btn btn-primary" onclick="goStep2()">ถัดไป →</button>
    </div>

    <!-- Step 2: Password & Grade -->
    <div id="step2" style="display:none;">
      <div class="form-group">
        <label class="form-label">🏫 ระดับชั้น</label>
        <select id="regGrade" class="form-select">
          <option value="">เลือกระดับชั้น</option>
          <optgroup label="ประถมศึกษา">
            <option>ป.1</option><option>ป.2</option><option>ป.3</option>
            <option>ป.4</option><option>ป.5</option><option>ป.6</option>
          </optgroup>
          <optgroup label="มัธยมศึกษาตอนต้น">
            <option>ม.1</option><option>ม.2</option><option>ม.3</option>
          </optgroup>
          <optgroup label="มัธยมศึกษาตอนปลาย">
            <option>ม.4</option><option>ม.5</option><option>ม.6</option>
          </optgroup>
          <optgroup label="อุดมศึกษา">
            <option>ปี 1</option><option>ปี 2</option>
            <option>ปี 3</option><option>ปี 4</option>
          </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">🔒 รหัสผ่าน</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔐</span>
          <input id="regPass" type="password" class="form-input"
                 placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password"
                 oninput="checkStrength()">
          <button class="input-toggle" onclick="togglePass('regPass', this)">👁️</button>
        </div>
        <!-- Strength bar -->
        <div id="strengthWrap" style="margin-top:8px;display:none;">
          <div style="height:4px;background:var(--border);border-radius:4px;overflow:hidden;">
            <div id="strengthBar" style="height:100%;width:0;transition:all 0.3s;border-radius:4px;"></div>
          </div>
          <div id="strengthLabel" style="font-size:11px;margin-top:4px;color:var(--text3);"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">🔒 ยืนยันรหัสผ่าน</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔐</span>
          <input id="regPassConfirm" type="password" class="form-input"
                 placeholder="กรอกรหัสผ่านอีกครั้ง" autocomplete="new-password">
          <button class="input-toggle" onclick="togglePass('regPassConfirm', this)">👁️</button>
        </div>
        <div id="matchStatus" style="font-size:12px;margin-top:6px;"></div>
      </div>

      <div style="margin-bottom:24px;">
        <label class="check-label" style="font-size:13px;color:var(--text2);">
          <input type="checkbox" id="agreeTerms">
          <span class="checkmark" id="termsCheck">✓</span>
          ฉันยอมรับ <a href="#" style="color:var(--accent2)">ข้อกำหนดการใช้งาน</a> และ
          <a href="#" style="color:var(--accent2)">นโยบายความเป็นส่วนตัว</a>
        </label>
      </div>

      <div style="display:flex;gap:12px;">
        <button class="btn btn-google" style="width:auto;padding:14px 24px;" onclick="goStep1()">← ย้อนกลับ</button>
        <button class="btn btn-primary" onclick="doRegister()">🎉 สมัครสมาชิก</button>
      </div>
    </div>

    <div class="link-row">
      มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ →</a>
    </div>
  </div>
</div>

<style>
.step-dot {
  width: 24px; height: 24px;
  border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--text3);
  flex-shrink: 0; transition: all 0.3s;
}
.step-dot.active {
  background: var(--accent); border-color: var(--accent); color: white;
}
.step-dot.done {
  background: var(--green); border-color: var(--green); color: white;
}
</style>

<script src="auth.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  redirectIfLoggedIn();
});

// Gmail auto-fill suggestion
document.getElementById('regEmail').addEventListener('blur', function() {
  const v = this.value.trim();
  const gmail = document.getElementById('regGmail');
  if (v && !gmail.value) {
    const suggestion = v.replace(/@.*$/, '@gmail.com');
    gmail.value = suggestion;
  }
  // Check if email already exists
  if (v) {
    const users = getUsers();
    const exists = users.find(u => u.email === v);
    const el = document.getElementById('emailStatus');
    if (exists) {
      el.innerHTML = '❌ <span style="color:var(--red)">อีเมลนี้ถูกใช้งานแล้ว</span>';
    } else {
      el.innerHTML = '✅ <span style="color:var(--green)">อีเมลนี้ใช้ได้</span>';
    }
  }
});

document.getElementById('regPassConfirm').addEventListener('input', function() {
  const p1 = document.getElementById('regPass').value;
  const el = document.getElementById('matchStatus');
  if (!this.value) { el.innerHTML = ''; return; }
  if (p1 === this.value) {
    el.innerHTML = '✅ <span style="color:var(--green)">รหัสผ่านตรงกัน</span>';
  } else {
    el.innerHTML = '❌ <span style="color:var(--red)">รหัสผ่านไม่ตรงกัน</span>';
  }
});

document.getElementById('agreeTerms').addEventListener('change', function() {
  document.getElementById('termsCheck').style.opacity = this.checked ? '1' : '0.3';
});

function checkStrength() {
  const p = document.getElementById('regPass').value;
  const wrap = document.getElementById('strengthWrap');
  const bar  = document.getElementById('strengthBar');
  const lbl  = document.getElementById('strengthLabel');
  if (!p) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  let score = 0;
  if (p.length >= 6) score++;
  if (p.length >= 10) score++;
  if (/[A-Z]/.test(p)) score++;
  if (/[0-9]/.test(p)) score++;
  if (/[^A-Za-z0-9]/.test(p)) score++;
  const levels = [
    { pct: '20%', color: 'var(--red)',    label: '😟 อ่อนมาก' },
    { pct: '40%', color: 'var(--red)',    label: '😕 อ่อน' },
    { pct: '60%', color: 'var(--yellow)', label: '😐 พอใช้' },
    { pct: '80%', color: 'var(--green)',  label: '😊 แข็งแกร่ง' },
    { pct: '100%',color: 'var(--green)',  label: '💪 แข็งแกร่งมาก' },
  ];
  const lv = levels[Math.max(0, score - 1)];
  bar.style.width = lv.pct;
  bar.style.background = lv.color;
  lbl.textContent = 'ความแข็งแกร่ง: ' + lv.label;
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function goStep2() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  if (!name)  { showToast('กรุณากรอกชื่อ', 'error'); return; }
  if (!email) { showToast('กรุณากรอกอีเมล', 'error'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast('รูปแบบอีเมลไม่ถูกต้อง', 'error'); return;
  }
  const users = getUsers();
  if (users.find(u => u.email === email)) {
    showToast('อีเมลนี้ถูกใช้งานแล้ว', 'error'); return;
  }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.querySelectorAll('.step-dot')[0].classList.add('done');
  document.querySelectorAll('.step-dot')[1].classList.add('active');
  document.getElementById('progress-bar').style.background = 'var(--accent)';
}

function goStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.querySelectorAll('.step-dot')[0].classList.remove('done');
  document.querySelectorAll('.step-dot')[0].classList.add('active');
  document.querySelectorAll('.step-dot')[1].classList.remove('active');
  document.getElementById('progress-bar').style.background = 'var(--border)';
}

function doRegister() {
  const name    = document.getElementById('regName').value.trim();
  const email   = document.getElementById('regEmail').value.trim();
  const gmail   = document.getElementById('regGmail').value.trim();
  const grade   = document.getElementById('regGrade').value;
  const pass    = document.getElementById('regPass').value;
  const confirm = document.getElementById('regPassConfirm').value;
  const agree   = document.getElementById('agreeTerms').checked;

  if (!pass || pass.length < 6) { showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error'); return; }
  if (pass !== confirm)         { showToast('รหัสผ่านไม่ตรงกัน', 'error'); return; }
  if (!agree)                   { showToast('กรุณายอมรับข้อกำหนดการใช้งาน', 'error'); return; }

  const result = register({ name, email, gmail, password: pass, grade });
  if (result.ok) {
    // Auto-login after register
    login({ email, password: pass, remember: false });
    showToast(`สมัครสำเร็จ! ยินดีต้อนรับ ${name} 🎉`, 'success', 2000);
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  } else {
    showToast(result.msg, 'error');
  }
}
</script>
</body>
</html>
