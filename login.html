<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — StudyDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-mesh"></div>

<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div>
        <div class="logo-text">StudyDesk</div>
        <div class="logo-sub">ระบบจัดการการเรียนของฉัน</div>
      </div>
    </div>

    <h1 class="auth-title">ยินดีต้อนรับกลับ 👋</h1>
    <p class="auth-subtitle">เข้าสู่ระบบเพื่อจัดการการบ้านและตารางเรียน</p>

    <!-- Google-style login button -->
    <button class="btn btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      เข้าสู่ระบบด้วย Google (จำลอง)
    </button>

    <div class="divider">หรือเข้าสู่ระบบด้วยอีเมล</div>

    <!-- Login Form -->
    <div class="form-group">
      <label class="form-label">📧 อีเมล</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input id="loginEmail" type="email" class="form-input"
               placeholder="your@email.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">🔑 รหัสผ่าน</label>
      <div class="input-icon-wrap">
        <span class="input-icon">🔒</span>
        <input id="loginPass" type="password" class="form-input"
               placeholder="รหัสผ่านของคุณ" autocomplete="current-password">
        <button class="input-toggle" onclick="togglePass('loginPass', this)">👁️</button>
      </div>
    </div>

    <div class="check-row">
      <label class="check-label">
        <input type="checkbox" id="rememberMe">
        <span class="checkmark" id="rememberCheck">✓</span>
        จดจำการเข้าสู่ระบบ
      </label>
      <a href="#" class="forgot-link" onclick="forgotPass()">ลืมรหัสผ่าน?</a>
    </div>

    <button class="btn btn-primary" onclick="doLogin()">
      🚀 เข้าสู่ระบบ
    </button>

    <div class="link-row">
      ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิกฟรี →</a>
    </div>

    <!-- Demo hint -->
    <div style="margin-top:20px; padding:14px; background:rgba(124,111,247,0.08);
                border-radius:10px; border:1px solid rgba(124,111,247,0.2);
                font-size:12px; color:var(--text3); text-align:center;">
      💡 ทดลองใช้: กรอก <strong style="color:var(--accent2)">demo@study.com</strong> / <strong style="color:var(--accent2)">demo1234</strong>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
// Auto-fill if remembered
window.addEventListener('DOMContentLoaded', () => {
  redirectIfLoggedIn();
  const rem = getRemembered();
  if (rem) {
    document.getElementById('loginEmail').value = rem.email;
    document.getElementById('rememberMe').checked = true;
    updateCheck();
  }

  // Create demo account if not exists
  const users = getUsers();
  if (!users.find(u => u.email === 'demo@study.com')) {
    register({ name: 'Demo Student', email: 'demo@study.com',
               gmail: 'demo@gmail.com', password: 'demo1234', grade: 'ม.3' });
  }
});

document.getElementById('rememberMe').addEventListener('change', updateCheck);

function updateCheck() {
  const cb = document.getElementById('rememberMe');
  const mark = document.getElementById('rememberCheck');
  mark.style.opacity = cb.checked ? '1' : '0.3';
}
updateCheck();

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!email || !password) {
    showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return;
  }

  const result = login({ email, password, remember });
  if (result.ok) {
    showToast(`ยินดีต้อนรับ ${result.user.name}! 🎉`, 'success', 1500);
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } else {
    showToast(result.msg, 'error');
  }
}

function loginWithGoogle() {
  showToast('ระบบ Google OAuth จำเป็นต้องมี Server ครับ — ลองใช้อีเมลธรรมดาก่อนนะ 😊', 'info', 4000);
}

function forgotPass() {
  showToast('กรุณาติดต่อผู้ดูแลระบบหรือสมัครบัญชีใหม่ 📧', 'info');
}

// Enter key submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
