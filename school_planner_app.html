<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #F8FAFC; min-height: 100vh; }
  button { font-family: 'Sarabun', sans-serif; }
  input, select { font-family: 'Sarabun', sans-serif; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1E293B; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 9999; animation: slideIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; width: 480px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
  .input-field { width: 100%; padding: 10px 12px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 14px; outline: none; background: #FAFAFA; color: #1E293B; font-family: 'Sarabun', sans-serif; }
  .input-field:focus { border-color: #4F46E5; background: #fff; }
  .label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px; }
  .field-wrap { margin-bottom: 16px; }
  .btn-primary { background: #4F46E5; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Sarabun', sans-serif; transition: background 0.2s; }
  .btn-primary:hover { background: #4338CA; }
  .btn-secondary { background: transparent; color: #4F46E5; border: 1px solid #4F46E5; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th, td { padding: 12px 10px; border-bottom: 1px solid #F1F5F9; }
  thead th { background: #F8FAFC; font-size: 13px; font-weight: 600; color: #64748B; border-bottom: 1px solid #E2E8F0; text-align: center; }
  thead th:first-child { text-align: left; width: 80px; }
  tbody td:first-child { font-size: 13px; color: #94A3B8; font-weight: 600; }
  .cls-cell { background: #fff; border: 1px solid transparent; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
  .page { display: none; }
  .page.active { display: block; }
  .hw-item { background: #fff; border-radius: 14px; padding: 18px 22px; border: 1px solid #E2E8F0; display: flex; align-items: center; gap: 18px; margin-bottom: 12px; transition: opacity 0.2s; }
  .sc-card { background: #fff; border-radius: 12px; padding: 16px 18px; border: 1px solid #E2E8F0; display: flex; align-items: center; gap: 14px; }
  .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #E2E8F0; font-size: 13px; cursor: pointer; background: #fff; color: #64748B; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }
  .filter-btn.active { background: #F0F9FF; color: #0369A1; font-weight: 600; border-color: #BAE6FD; }
</style>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="page-login" class="page active">
  <div style="min-height:100vh;background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 100%);display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(79,70,229,0.12);padding:48px 40px;width:400px;max-width:90vw;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:48px;margin-bottom:8px;">📚</div>
        <h1 style="font-size:24px;font-weight:700;color:#1E293B;">SchoolPlanner</h1>
        <p style="margin-top:8px;color:#64748B;font-size:14px;">จัดการการบ้านและตารางเรียน</p>
      </div>
      <div id="login-err" style="display:none;background:#FEF2F2;color:#DC2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;"></div>
      <div class="field-wrap">
        <label class="label">ชื่อผู้ใช้</label>
        <input class="input-field" id="login-username" placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div class="field-wrap" style="margin-bottom:24px;">
        <label class="label">รหัสผ่าน</label>
        <input class="input-field" id="login-password" type="password" placeholder="กรอกรหัสผ่าน">
      </div>
      <button class="btn-primary" onclick="handleLogin()">เข้าสู่ระบบ</button>
      <p style="text-align:center;margin-top:20px;font-size:14px;color:#64748B;">ยังไม่มีบัญชี? <span style="color:#4F46E5;font-weight:600;cursor:pointer;" onclick="showPage('register')">สมัครสมาชิก</span></p>
      <div style="margin-top:20px;padding:12px 16px;background:#F8FAFC;border-radius:8px;font-size:12px;color:#64748B;text-align:center;">ทดลองใช้: <strong>demo</strong> / <strong>1234</strong></div>
    </div>
  </div>
</div>

<!-- ==================== REGISTER PAGE ==================== -->
<div id="page-register" class="page">
  <div style="min-height:100vh;background:linear-gradient(135deg,#EEF2FF 0%,#F0FDF4 100%);display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(79,70,229,0.12);padding:48px 40px;width:420px;max-width:90vw;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:48px;margin-bottom:8px;">✏️</div>
        <h1 style="font-size:24px;font-weight:700;color:#1E293B;">สมัครสมาชิก</h1>
        <p style="margin-top:8px;color:#64748B;font-size:14px;">สร้างบัญชีใหม่</p>
      </div>
      <div id="reg-err" style="display:none;background:#FEF2F2;color:#DC2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;"></div>
      <div class="field-wrap"><label class="label">ชื่อ-นามสกุล</label><input class="input-field" id="reg-name" placeholder="เช่น สมชาย ใจดี"></div>
      <div class="field-wrap"><label class="label">ชื่อผู้ใช้</label><input class="input-field" id="reg-username" placeholder="ตัวอักษรภาษาอังกฤษ"></div>
      <div class="field-wrap"><label class="label">รหัสผ่าน</label><input class="input-field" id="reg-password" type="password" placeholder="อย่างน้อย 4 ตัวอักษร"></div>
      <div class="field-wrap" style="margin-bottom:24px;"><label class="label">ยืนยันรหัสผ่าน</label><input class="input-field" id="reg-confirm" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง"></div>
      <button class="btn-primary" onclick="handleRegister()">สมัครสมาชิก</button>
      <p style="text-align:center;margin-top:20px;font-size:14px;color:#64748B;">มีบัญชีแล้ว? <span style="color:#4F46E5;font-weight:600;cursor:pointer;" onclick="showPage('login')">เข้าสู่ระบบ</span></p>
    </div>
  </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div id="page-dashboard" class="page">
  <!-- Header -->
  <div style="background:#fff;border-bottom:1px solid #E2E8F0;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:24px;">📚</span>
      <span style="font-weight:700;font-size:18px;color:#1E293B;">SchoolPlanner</span>
    </div>
    <div style="display:flex;align-items:center;gap:20px;">
      <span style="font-size:14px;color:#64748B;">สวัสดี, <strong id="header-name" style="color:#1E293B;"></strong></span>
      <button onclick="handleLogout()" style="background:none;border:1px solid #E2E8F0;border-radius:8px;padding:6px 14px;font-size:13px;color:#64748B;cursor:pointer;font-family:'Sarabun',sans-serif;">ออกจากระบบ</button>
    </div>
  </div>

  <div style="max-width:1100px;margin:0 auto;padding:32px 24px;">
    <!-- Stats -->
    <div id="stats-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;"></div>

    <!-- Today banner -->
    <div id="today-banner" style="display:none;background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:14px;padding:20px 24px;margin-bottom:28px;color:#fff;display:flex;align-items:center;gap:20px;flex-wrap:wrap;"></div>

    <!-- Tabs -->
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      <button id="tab-hw-btn" onclick="switchTab('homework')" style="padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#4F46E5;color:#fff;box-shadow:0 4px 14px rgba(79,70,229,0.35);font-family:'Sarabun',sans-serif;">📝 การบ้าน</button>
      <button id="tab-sc-btn" onclick="switchTab('schedule')" style="padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#64748B;font-family:'Sarabun',sans-serif;">🗓️ ตารางเรียน</button>
    </div>

    <!-- Homework Tab -->
    <div id="tab-homework" class="tab-content active">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="filter-btn active" id="f-all" onclick="setFilter('all')">ทั้งหมด</button>
          <button class="filter-btn" id="f-pending" onclick="setFilter('pending')">รอส่ง</button>
          <button class="filter-btn" id="f-done" onclick="setFilter('done')">ส่งแล้ว</button>
          <button class="filter-btn" id="f-overdue" onclick="setFilter('overdue')">เกินกำหนด</button>
        </div>
        <button onclick="openHwModal(null)" style="background:#4F46E5;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;">+ เพิ่มการบ้าน</button>
      </div>
      <div id="hw-list"></div>
    </div>

    <!-- Schedule Tab -->
    <div id="tab-schedule" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-size:18px;font-weight:700;color:#1E293B;">ตารางเรียนประจำสัปดาห์</h2>
        <button onclick="openScModal(null)" style="background:#4F46E5;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;">+ เพิ่มคาบเรียน</button>
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid #E2E8F0;overflow:auto;margin-bottom:24px;">
        <table id="schedule-grid"></table>
      </div>
      <h3 style="font-size:16px;font-weight:700;color:#1E293B;margin-bottom:14px;">รายการคาบเรียน</h3>
      <div id="sc-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;"></div>
    </div>
  </div>
</div>

<!-- ==================== MODALS ==================== -->
<div id="hw-modal" class="overlay" style="display:none;">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h3 id="hw-modal-title" style="font-size:18px;font-weight:700;color:#1E293B;"></h3>
      <span style="font-size:22px;cursor:pointer;color:#94A3B8;" onclick="closeHwModal()">✕</span>
    </div>
    <div class="field-wrap"><label class="label">วิชา</label><select class="input-field" id="hw-subject"></select></div>
    <div class="field-wrap"><label class="label">ชื่องาน/การบ้าน</label><input class="input-field" id="hw-title" placeholder="เช่น แบบฝึกหัดบทที่ 3"></div>
    <div class="field-wrap"><label class="label">วันที่ส่ง</label><input class="input-field" id="hw-due" type="date"></div>
    <div class="field-wrap"><label class="label">หมายเหตุ (ไม่บังคับ)</label><input class="input-field" id="hw-note" placeholder="รายละเอียดเพิ่มเติม"></div>
    <div class="field-wrap"><label class="label">สถานะ</label><select class="input-field" id="hw-status"><option value="pending">รอส่ง</option><option value="done">ส่งแล้ว</option></select></div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeHwModal()">ยกเลิก</button>
      <button class="btn-primary" style="flex:2;" onclick="saveHw()">บันทึก</button>
    </div>
  </div>
</div>

<div id="sc-modal" class="overlay" style="display:none;">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h3 id="sc-modal-title" style="font-size:18px;font-weight:700;color:#1E293B;"></h3>
      <span style="font-size:22px;cursor:pointer;color:#94A3B8;" onclick="closeScModal()">✕</span>
    </div>
    <div class="field-wrap"><label class="label">วัน</label><select class="input-field" id="sc-day"></select></div>
    <div class="field-wrap"><label class="label">เวลาเริ่ม</label><select class="input-field" id="sc-time"></select></div>
    <div class="field-wrap"><label class="label">วิชา</label><select class="input-field" id="sc-subject"></select></div>
    <div class="field-wrap"><label class="label">ชื่ออาจารย์</label><input class="input-field" id="sc-teacher" placeholder="เช่น อ.สมหมาย"></div>
    <div class="field-wrap"><label class="label">ห้องเรียน</label><input class="input-field" id="sc-room" placeholder="เช่น ห้อง 101"></div>
    <div class="field-wrap"><label class="label">จำนวนชั่วโมง</label><select class="input-field" id="sc-duration"><option value="1">1 ชั่วโมง</option><option value="2">2 ชั่วโมง</option><option value="3">3 ชั่วโมง</option></select></div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeScModal()">ยกเลิก</button>
      <button class="btn-primary" style="flex:2;" onclick="saveSc()">บันทึก</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
// ========== CONSTANTS ==========
const DAYS = ["จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์"];
const TIMES = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];
const SUBJECTS_COLOR = {
  "คณิตศาสตร์":"#4F46E5","ภาษาไทย":"#059669","ภาษาอังกฤษ":"#D97706",
  "วิทยาศาสตร์":"#DC2626","สังคมศึกษา":"#7C3AED","พลศึกษา":"#0891B2",
  "ศิลปะ":"#DB2777","คอมพิวเตอร์":"#EA580C","อื่นๆ":"#6B7280"
};
const getColor = s => SUBJECTS_COLOR[s] || "#6B7280";
const subjects = Object.keys(SUBJECTS_COLOR);

// ========== STATE ==========
let users = [{ username:"demo", password:"1234", name:"นักเรียนตัวอย่าง" }];
let currentUser = null;
let homework = [
  { id:1, subject:"คณิตศาสตร์", title:"แบบฝึกหัด บทที่ 3", due:"2026-04-28", status:"pending", note:"หน้า 45-50" },
  { id:2, subject:"ภาษาอังกฤษ", title:"เขียนเรียงความ My Family", due:"2026-04-27", status:"done", note:"" },
  { id:3, subject:"วิทยาศาสตร์", title:"รายงานระบบสุริยะ", due:"2026-04-30", status:"pending", note:"ส่งเป็น PDF" },
];
let schedule = [
  { id:1, day:"จันทร์",   time:"08:00", subject:"คณิตศาสตร์", teacher:"อ.สมหมาย", room:"ห้อง 101",  duration:1 },
  { id:2, day:"จันทร์",   time:"10:00", subject:"ภาษาไทย",    teacher:"อ.สมศรี",   room:"ห้อง 102",  duration:1 },
  { id:3, day:"อังคาร",   time:"09:00", subject:"วิทยาศาสตร์",teacher:"อ.วิชัย",   room:"ห้องแล็บ",  duration:2 },
  { id:4, day:"พุธ",      time:"08:00", subject:"ภาษาอังกฤษ", teacher:"อ.John",    room:"ห้อง 201",  duration:1 },
  { id:5, day:"พฤหัสบดี", time:"13:00", subject:"คอมพิวเตอร์",teacher:"อ.ณัฐพล",  room:"ห้องคอม",   duration:2 },
  { id:6, day:"ศุกร์",    time:"10:00", subject:"ศิลปะ",      teacher:"อ.สุดา",    room:"ห้องศิลปะ", duration:1 },
];
let hwFilter = "all";
let activeTab = "homework";
let editHwId = null;
let editScId = null;

// ========== UTILS ==========
const today = () => new Date().toISOString().split("T")[0];
const todayName = () => DAYS[new Date().getDay() - 1] || "";

function getDueLabel(due) {
  const t = today();
  if (due === t) return { text:"วันนี้!", color:"#DC2626" };
  const diff = Math.ceil((new Date(due) - new Date(t)) / 86400000);
  if (diff < 0) return { text:`เกิน ${-diff} วัน`, color:"#DC2626" };
  if (diff === 1) return { text:"พรุ่งนี้", color:"#D97706" };
  if (diff <= 3) return { text:`อีก ${diff} วัน`, color:"#D97706" };
  return { text:`${diff} วัน`, color:"#6B7280" };
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 2500);
}

function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
}

// ========== AUTH ==========
function handleLogin() {
  const u = document.getElementById("login-username").value.trim();
  const p = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-err");
  const found = users.find(x => x.username === u && x.password === p);
  if (!found) { errEl.textContent = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"; errEl.style.display = "block"; return; }
  errEl.style.display = "none";
  currentUser = found;
  document.getElementById("header-name").textContent = found.name;
  renderDashboard();
  showPage("dashboard");
}

function handleRegister() {
  const name = document.getElementById("reg-name").value.trim();
  const username = document.getElementById("reg-username").value.trim();
  const password = document.getElementById("reg-password").value;
  const confirm = document.getElementById("reg-confirm").value;
  const errEl = document.getElementById("reg-err");
  if (!name || !username || !password) { errEl.textContent = "กรุณากรอกข้อมูลให้ครบ"; errEl.style.display = "block"; return; }
  if (password.length < 4) { errEl.textContent = "รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร"; errEl.style.display = "block"; return; }
  if (password !== confirm) { errEl.textContent = "รหัสผ่านไม่ตรงกัน"; errEl.style.display = "block"; return; }
  if (users.find(x => x.username === username)) { errEl.textContent = "ชื่อผู้ใช้นี้มีอยู่แล้ว"; errEl.style.display = "block"; return; }
  users.push({ username, password, name });
  errEl.style.display = "none";
  showToast("สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ");
  showPage("login");
  document.getElementById("login-username").value = username;
}

function handleLogout() {
  currentUser = null;
  showPage("login");
}

// ========== DASHBOARD RENDER ==========
function renderDashboard() {
  renderStats();
  renderTodayBanner();
  renderHwList();
  renderSchedule();
}

function renderStats() {
  const t = today();
  const tn = todayName();
  const overdue = homework.filter(h => h.status === "pending" && h.due < t).length;
  const done = homework.filter(h => h.status === "done").length;
  const pending = homework.filter(h => h.status === "pending").length;
  const todayCls = schedule.filter(s => s.day === tn).length;
  const stats = [
    { icon:"📋", label:"การบ้านทั้งหมด", value:homework.length, color:"#4F46E5", bg:"#EEF2FF" },
    { icon:"⏰", label:"รอส่ง",           value:pending,         color:"#D97706", bg:"#FFFBEB" },
    { icon:"✅", label:"ส่งแล้ว",         value:done,            color:"#059669", bg:"#F0FDF4" },
    { icon:"🚨", label:"เกินกำหนด",       value:overdue,         color:"#DC2626", bg:"#FEF2F2" },
    { icon:"📅", label:"คาบเรียนวันนี้",  value:todayCls,        color:"#7C3AED", bg:"#F5F3FF" },
  ];
  document.getElementById("stats-row").innerHTML = stats.map(s => `
    <div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E2E8F0;display:flex;align-items:center;gap:14px;">
      <div style="width:48px;height:48px;border-radius:12px;background:${s.bg};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${s.icon}</div>
      <div><div style="font-size:13px;color:#64748B;font-weight:500;">${s.label}</div><div style="font-size:26px;font-weight:700;color:${s.color};">${s.value}</div></div>
    </div>`).join("");
}

function renderTodayBanner() {
  const tn = todayName();
  const todayCls = schedule.filter(s => s.day === tn).sort((a,b) => a.time.localeCompare(b.time));
  const banner = document.getElementById("today-banner");
  if (todayCls.length === 0) { banner.style.display = "none"; return; }
  banner.style.display = "flex";
  banner.innerHTML = `
    <div><div style="font-size:13px;opacity:0.8;">วันนี้มีเรียน</div><div style="font-size:18px;font-weight:700;">วัน${tn} — ${todayCls.length} คาบ</div></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">${todayCls.map(c => `<div style="background:rgba(255,255,255,0.2);border-radius:8px;padding:6px 14px;font-size:13px;">${c.time} ${c.subject}</div>`).join("")}</div>`;
}

function renderHwList() {
  const t = today();
  let list = homework.filter(h => {
    if (hwFilter === "pending") return h.status === "pending";
    if (hwFilter === "done") return h.status === "done";
    if (hwFilter === "overdue") return h.status === "pending" && h.due < t;
    return true;
  }).sort((a,b) => a.due.localeCompare(b.due));

  const container = document.getElementById("hw-list");
  if (list.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#94A3B8;"><div style="font-size:48px;margin-bottom:12px;">🎉</div><div style="font-size:16px;">ไม่มีการบ้านในหมวดนี้</div></div>`;
    return;
  }
  container.innerHTML = list.map(h => {
    const c = getColor(h.subject);
    const dueInfo = getDueLabel(h.due);
    return `<div class="hw-item" style="opacity:${h.status==='done'?0.7:1}">
      <input type="checkbox" ${h.status==='done'?'checked':''} onchange="toggleHw(${h.id})" style="width:20px;height:20px;accent-color:#4F46E5;cursor:pointer;flex-shrink:0;">
      <div style="width:4px;height:52px;border-radius:4px;background:${c};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="font-size:15px;font-weight:600;color:#1E293B;${h.status==='done'?'text-decoration:line-through;':''}">${h.title}</span>
          <span style="background:${c}18;color:${c};border-radius:6px;padding:2px 10px;font-size:12px;font-weight:600;">${h.subject}</span>
        </div>
        ${h.note ? `<div style="font-size:13px;color:#64748B;margin-top:4px;">${h.note}</div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:13px;color:#94A3B8;">ส่ง ${h.due}</div>
        ${h.status==='done' ? '<div style="font-size:13px;color:#059669;font-weight:600;">✅ ส่งแล้ว</div>' : `<div style="font-size:13px;color:${dueInfo.color};font-weight:600;">${dueInfo.text}</div>`}
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="openHwModal(${h.id})" style="background:#F1F5F9;border:none;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;">✏️</button>
        <button onclick="deleteHw(${h.id})" style="background:#FEF2F2;border:none;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;">🗑️</button>
      </div>
    </div>`;
  }).join("");
}

function renderSchedule() {
  const tn = todayName();
  // Grid
  let html = `<thead><tr><th style="text-align:left;padding:14px 16px;font-size:13px;font-weight:600;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0;width:80px;">เวลา</th>`;
  DAYS.forEach(d => {
    const isToday = d === tn;
    html += `<th style="padding:14px 16px;font-size:13px;font-weight:600;color:${isToday?'#4F46E5':'#64748B'};background:${isToday?'#EEF2FF':'#F8FAFC'};border-bottom:1px solid #E2E8F0;text-align:center;">${isToday?`★ ${d}`:d}</th>`;
  });
  html += `</tr></thead><tbody>`;
  TIMES.forEach((time, ti) => {
    html += `<tr style="background:${ti%2===0?'#fff':'#FAFAFA'}"><td style="padding:12px 16px;font-size:13px;color:#94A3B8;border-bottom:1px solid #F1F5F9;font-weight:600;">${time}</td>`;
    DAYS.forEach(day => {
      const cls = schedule.find(s => s.day === day && s.time === time);
      const isToday = day === tn;
      if (cls) {
        const c = getColor(cls.subject);
        html += `<td style="padding:8px 10px;border-bottom:1px solid #F1F5F9;text-align:center;background:${isToday?'#F5F7FF':'transparent'};">
          <div class="cls-cell" style="background:${c}15;border-color:${c}40;" onclick="openScModal(${cls.id})">
            <div style="font-size:12px;font-weight:700;color:${c};">${cls.subject}</div>
            <div style="font-size:11px;color:#64748B;margin-top:2px;">${cls.teacher}</div>
            <div style="font-size:11px;color:#94A3B8;">${cls.room}</div>
          </div></td>`;
      } else {
        html += `<td style="padding:8px 10px;border-bottom:1px solid #F1F5F9;background:${isToday?'#F5F7FF':'transparent'};"></td>`;
      }
    });
    html += `</tr>`;
  });
  html += `</tbody>`;
  document.getElementById("schedule-grid").innerHTML = html;

  // List
  const sorted = [...schedule].sort((a,b) => DAYS.indexOf(a.day)-DAYS.indexOf(b.day) || a.time.localeCompare(b.time));
  document.getElementById("sc-list").innerHTML = sorted.map(s => {
    const c = getColor(s.subject);
    return `<div class="sc-card">
      <div style="width:46px;height:46px;border-radius:10px;background:${c}18;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
        <div style="font-size:11px;font-weight:700;color:${c};">${s.day}</div>
        <div style="font-size:11px;color:${c};">${s.time}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:700;color:#1E293B;">${s.subject}</div>
        <div style="font-size:12px;color:#64748B;">${s.teacher} · ${s.room}</div>
        <div style="font-size:12px;color:#94A3B8;">${s.duration} ชั่วโมง</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="openScModal(${s.id})" style="background:#F1F5F9;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;">✏️</button>
        <button onclick="deleteSc(${s.id})" style="background:#FEF2F2;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;">🗑️</button>
      </div>
    </div>`;
  }).join("");
}

// ========== TAB & FILTER ==========
function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-homework").classList.toggle("active", tab==="homework");
  document.getElementById("tab-schedule").classList.toggle("active", tab==="schedule");
  const hwBtn = document.getElementById("tab-hw-btn");
  const scBtn = document.getElementById("tab-sc-btn");
  if (tab==="homework") {
    hwBtn.style.cssText = "padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#4F46E5;color:#fff;box-shadow:0 4px 14px rgba(79,70,229,0.35);font-family:'Sarabun',sans-serif;";
    scBtn.style.cssText = "padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#64748B;font-family:'Sarabun',sans-serif;";
  } else {
    scBtn.style.cssText = "padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#4F46E5;color:#fff;box-shadow:0 4px 14px rgba(79,70,229,0.35);font-family:'Sarabun',sans-serif;";
    hwBtn.style.cssText = "padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#64748B;font-family:'Sarabun',sans-serif;";
  }
}

function setFilter(f) {
  hwFilter = f;
  ["all","pending","done","overdue"].forEach(k => {
    document.getElementById("f-"+k).classList.toggle("active", k===f);
  });
  renderHwList();
}

// ========== HOMEWORK ACTIONS ==========
function toggleHw(id) {
  const h = homework.find(x => x.id === id);
  h.status = h.status === "done" ? "pending" : "done";
  renderHwList();
  renderStats();
}

function deleteHw(id) {
  homework = homework.filter(h => h.id !== id);
  renderHwList();
  renderStats();
  showToast("ลบการบ้านแล้ว");
}

function openHwModal(id) {
  editHwId = id;
  const modal = document.getElementById("hw-modal");
  // Populate subjects
  const sel = document.getElementById("hw-subject");
  sel.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join("");
  if (id) {
    const h = homework.find(x => x.id === id);
    document.getElementById("hw-modal-title").textContent = "แก้ไขการบ้าน";
    sel.value = h.subject;
    document.getElementById("hw-title").value = h.title;
    document.getElementById("hw-due").value = h.due;
    document.getElementById("hw-note").value = h.note;
    document.getElementById("hw-status").value = h.status;
  } else {
    document.getElementById("hw-modal-title").textContent = "เพิ่มการบ้าน";
    sel.value = subjects[0];
    document.getElementById("hw-title").value = "";
    document.getElementById("hw-due").value = "";
    document.getElementById("hw-note").value = "";
    document.getElementById("hw-status").value = "pending";
  }
  modal.style.display = "flex";
}

function closeHwModal() { document.getElementById("hw-modal").style.display = "none"; editHwId = null; }

function saveHw() {
  const title = document.getElementById("hw-title").value.trim();
  const due = document.getElementById("hw-due").value;
  if (!title || !due) { showToast("กรุณากรอกชื่องานและวันส่ง"); return; }
  const data = {
    subject: document.getElementById("hw-subject").value,
    title, due,
    note: document.getElementById("hw-note").value,
    status: document.getElementById("hw-status").value,
  };
  if (editHwId) {
    homework = homework.map(h => h.id === editHwId ? { ...data, id: editHwId } : h);
    showToast("แก้ไขการบ้านสำเร็จ");
  } else {
    homework.push({ ...data, id: Date.now() });
    showToast("เพิ่มการบ้านสำเร็จ");
  }
  closeHwModal();
  renderHwList();
  renderStats();
}

// ========== SCHEDULE ACTIONS ==========
function deleteSc(id) {
  schedule = schedule.filter(s => s.id !== id);
  renderSchedule();
  renderStats();
  renderTodayBanner();
  showToast("ลบคาบเรียนแล้ว");
}

function openScModal(id) {
  editScId = id;
  const modal = document.getElementById("sc-modal");
  // Populate selects
  document.getElementById("sc-day").innerHTML = DAYS.map(d => `<option value="${d}">${d}</option>`).join("");
  document.getElementById("sc-time").innerHTML = TIMES.map(t => `<option value="${t}">${t}</option>`).join("");
  document.getElementById("sc-subject").innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join("");
  if (id) {
    const s = schedule.find(x => x.id === id);
    document.getElementById("sc-modal-title").textContent = "แก้ไขคาบเรียน";
    document.getElementById("sc-day").value = s.day;
    document.getElementById("sc-time").value = s.time;
    document.getElementById("sc-subject").value = s.subject;
    document.getElementById("sc-teacher").value = s.teacher;
    document.getElementById("sc-room").value = s.room;
    document.getElementById("sc-duration").value = s.duration;
  } else {
    document.getElementById("sc-modal-title").textContent = "เพิ่มคาบเรียน";
    document.getElementById("sc-teacher").value = "";
    document.getElementById("sc-room").value = "";
    document.getElementById("sc-duration").value = "1";
  }
  modal.style.display = "flex";
}

function closeScModal() { document.getElementById("sc-modal").style.display = "none"; editScId = null; }

function saveSc() {
  const teacher = document.getElementById("sc-teacher").value.trim();
  const room = document.getElementById("sc-room").value.trim();
  if (!teacher || !room) { showToast("กรุณากรอกข้อมูลให้ครบ"); return; }
  const data = {
    day: document.getElementById("sc-day").value,
    time: document.getElementById("sc-time").value,
    subject: document.getElementById("sc-subject").value,
    teacher, room,
    duration: Number(document.getElementById("sc-duration").value),
  };
  if (editScId) {
    schedule = schedule.map(s => s.id === editScId ? { ...data, id: editScId } : s);
    showToast("แก้ไขตารางเรียนสำเร็จ");
  } else {
    schedule.push({ ...data, id: Date.now() });
    showToast("เพิ่มคาบเรียนสำเร็จ");
  }
  closeScModal();
  renderSchedule();
  renderStats();
  renderTodayBanner();
}

// Enter key for login
document.getElementById("login-password").addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
document.getElementById("login-username").addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
